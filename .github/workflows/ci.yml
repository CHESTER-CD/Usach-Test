name: CI

on:
  push:
    branches:
      - JCANDIA
  pull_request:
    branches:
      - JCANDIA

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    - name: Lint (Checkstyle)
      run: mvn checkstyle:check

    - name: Run unit tests
      run: mvn test

    - name: Code coverage (JaCoCo)
      run: mvn jacoco:report

    - name: Security scan (OWASP Dependency-Check)
      run: mvn org.owasp:dependency-check-maven:check

    # Opcional: Publicar en registry (ejemplo para GitHub Packages)
    # - name: Publish package
    #   run: mvn deploy

    # Opcional: SonarCloud análisis
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        projectBaseDir: .
        args: >
          -Dsonar.projectKey=CHESTER-CD_Usach-Test
          -Dsonar.organization=chester-cd
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
