name: CI

on:
  push:
    branches: [ JCANDIA ]
  pull_request:
    branches: [ JCANDIA ]
  schedule:
    - cron: '0 6 * * 1'   # Lunes 06:00 UTC (ajusta horario si quieres)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Cache de la DB de OWASP (evita mega-descarga cada vez)
      - name: Cache OWASP DC data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-db-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: owasp-db-${{ runner.os }}-

      # Detectar si cambió pom.xml (para decidir si correr OWASP)
      - name: Detect dependency changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'pom.xml'
              - '**/pom.xml'

      # Compila, corre tests, checkstyle y jacoco (por estar en verify)
      - name: Build, test, checkstyle & coverage
        run: mvn -B -ntp clean verify

      # OWASP: solo si cambiaron deps o en la ejecución programada
      - name: Security scan (OWASP Dependency-Check)
        if: steps.changes.outputs.deps == 'true' || github.event_name == 'schedule'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -ntp org.owasp:dependency-check-maven:check

      # Publicar artefactos y reportes
      - name: Upload reports & JAR
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            target/*.jar
            target/site/jacoco/**
            target/dependency-check-report.*
            target/surefire-reports/**
