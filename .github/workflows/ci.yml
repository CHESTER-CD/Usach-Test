name: CI

on:
  push:
    branches: [ main, V0.9 ]
  pull_request:
    branches: [ main, V0.9 ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Maven
      uses: s4u/setup-maven-action@v1
      with:
        maven-version: '3.9.6'

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Lint (Checkstyle)
      run: mvn checkstyle:check

    - name: Run unit tests
      run: mvn test

    - name: Code coverage (JaCoCo)
      run: mvn jacoco:report

    - name: Security scan (OWASP Dependency-Check)
      run: mvn org.owasp:dependency-check-maven:check

    # Opcional: Publicar en registry (ejemplo para GitHub Packages)
