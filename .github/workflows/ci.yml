name: CI

on:
  push:
    branches: [ JCANDIA ]
  pull_request:
    branches: [ JCANDIA ]
  schedule:
    - cron: '0 6 * * 1'   # Lunes 06:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # para decoración de PR por Sonar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache OWASP DC data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-db-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            owasp-db-${{ runner.os }}-

      - name: Detect dependency changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deps:
              - 'pom.xml'
              - '**/pom.xml'

      # Compila ANTES del análisis (para generar target/classes y jacoco.xml)
      - name: Build, test, checkstyle & coverage
        run: mvn -B -ntp clean verify

      # --- SonarCloud (acción oficial) ---
      - name: SonarCloud Scan
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=chester-cd
            -Dsonar.projectKey=CHESTER-CD_Usach-Test
            -Dsonar.qualitygate.wait=true
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.junit.reportPaths=target/surefire-reports
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      # --- OWASP: solo si cambian deps o en el schedule semanal ---
      - name: Security scan (OWASP Dependency-Check)
        if: steps.changes.outputs.deps == 'true' || github.event_name == 'schedule'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -ntp org.owasp:dependency-check-maven:check

      - name: Upload reports & JAR
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            target/*.jar
            target/site/jacoco/**
            target/dependency-check-report.*
            target/surefire-reports/**
